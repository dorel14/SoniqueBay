# Docker Compose optimisé pour SoniqueBay - Raspberry Pi 4
# Intègre Supabase + toutes les optimisations pour RPi4
# Architecture: Supabase (PostgreSQL + Realtime + Auth) + FastAPI + Celery + LLM

services:
    # === TIME SYNC SERVICE (OPTIMISÉ) ===
    timesync:
        image: ubuntu:22.04
        container_name: soniquebay-timesync
        restart: unless-stopped
        environment:
            - TZ=${TZ}
        command: >
            sh -c "
                echo 'Time sync service started'
                echo 'Raspberry Pi uses NTP via systemd-timesyncd'
                echo 'Configuring timezone from TZ environment variable...'
                echo 'Using TZ environment variable for timezone configuration'
                export TZ=$TZ
                echo 'Timezone set to '$TZ
                echo 'Local time: '$(date)
                echo 'UTC time: '$(date -u)
                sleep infinity
            "
        volumes:
            - /etc/localtime:/etc/localtime:ro
            - ./logs:/var/log
        networks:
            default:
                aliases:
                    - timesync

    # === POSTGRESQL ORIGINAL (conservé pour compatibilité) ===
    db:
        build:
            context: .
            dockerfile: db_folder/Dockerfile
            args:
                LOCALE_LANGUAGE: ${LOCALE_LANGUAGE}
        restart: unless-stopped
        networks:
            default:
                aliases:
                    - db
        container_name: soniquebay-postgres
        ports:
            - 5432:5432
        env_file:
            - .env
        environment:
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}
        user: root
        volumes:
            - ./db_folder/pg_db:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
            interval: 30s
            timeout: 5s
            retries: 5

    # === SUPABASE - PostgreSQL avec extensions ===
    supabase-db:
        image: supabase/postgres:15.1.0.117
        container_name: soniquebay-supabase-db
        restart: unless-stopped
        networks:
            default:
                aliases:
                    - supabase-db
        ports:
            - "54322:5432"
        env_file:
            - .env
        environment:
            - POSTGRES_USER=${SUPABASE_DB_USER:-supabase}
            - POSTGRES_PASSWORD=${SUPABASE_DB_PASSWORD:-supabase}
            - POSTGRES_DB=${SUPABASE_DB_NAME:-postgres}
            - JWT_SECRET=${SUPABASE_JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
        volumes:
            - supabase-data:/var/lib/postgresql/data
            - ./supabase/db_init/init_supabase.sql:/docker-entrypoint-initdb.d/init.sql:ro
        healthcheck:
            test: ["CMD", "pg_isready", "-U", "${SUPABASE_DB_USER:-supabase}", "-d", "${SUPABASE_DB_NAME:-postgres}"]
            interval: 30s
            timeout: 5s
            retries: 5
            start_period: 60s

    # === SUPABASE - Realtime ===
    supabase-realtime:
        image: supabase/realtime:v2.25.66
        container_name: soniquebay-supabase-realtime
        restart: unless-stopped
        depends_on:
            supabase-db:
                condition: service_healthy
        networks:
            default:
                aliases:
                    - supabase-realtime
        ports:
            - "54323:4000"
        environment:
            - DB_HOST=supabase-db
            - DB_PORT=5432
            - DB_USER=${SUPABASE_DB_USER:-supabase}
            - DB_PASSWORD=${SUPABASE_DB_PASSWORD:-supabase}
            - DB_NAME=${SUPABASE_DB_NAME:-postgres}
            - DB_SSL=false
            - JWT_SECRET=${SUPABASE_JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
            - SECRET_KEY_BASE=${SUPABASE_SECRET_KEY_BASE:-your-super-secret-key-base-with-at-least-64-characters-long}
            - PORT=4000
            - FLY_ALLOC_ID=123e4567-e89b-12d3-a456-426614174000
            - FLY_APP_NAME=realtime
            - FLY_REGION=local
            - ERL_AFLAGS=-proto_dist inet_tcp
            - ENABLE_TAILSCALE=false
            - DNS_NODES=''
            - MAX_CONNECTIONS=100
            - MAX_SUBSCRIBERS=1000
            - MAX_EVENTS_PER_SECOND=1000

    # === SUPABASE - Auth (GoTrue) ===
    supabase-auth:
        image: supabase/gotrue:v2.145.0
        container_name: soniquebay-supabase-auth
        restart: unless-stopped
        depends_on:
            supabase-db:
                condition: service_healthy
        networks:
            default:
                aliases:
                    - supabase-auth
        ports:
            - "54324:9999"
        environment:
            - GOTRUE_API_HOST=0.0.0.0
            - GOTRUE_API_PORT=9999
            - API_EXTERNAL_URL=${SUPABASE_API_EXTERNAL_URL:-http://localhost:54324}
            - GOTRUE_DB_DRIVER=postgres
            - GOTRUE_DB_DATABASE_URL=postgres://${SUPABASE_DB_USER:-supabase}:${SUPABASE_DB_PASSWORD:-supabase}@supabase-db:5432/${SUPABASE_DB_NAME:-postgres}?sslmode=disable
            - GOTRUE_SITE_URL=${SUPABASE_SITE_URL:-http://localhost:3000}
            - GOTRUE_URI_ALLOW_LIST=${SUPABASE_REDIRECT_URLS:-http://localhost:3000/**}
            - GOTRUE_DISABLE_SIGNUP=false
            - GOTRUE_JWT_SECRET=${SUPABASE_JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
            - GOTRUE_JWT_EXP=3600
            - GOTRUE_JWT_DEFAULT_GROUP_NAME=authenticated
            - GOTRUE_EXTERNAL_EMAIL_ENABLED=true
            - GOTRUE_MAILER_AUTOCONFIRM=true
            - GOTRUE_SMTP_ADMIN_EMAIL=admin@soniquebay.local
            - GOTRUE_SMTP_HOST=mail.soniquebay.local
            - GOTRUE_SMTP_PORT=25
            - GOTRUE_SMTP_USER=
            - GOTRUE_SMTP_PASS=
            - GOTRUE_SMTP_MAX_FREQUENCY=1s
            - GOTRUE_EXTERNAL_PHONE_ENABLED=false
            - GOTRUE_SMS_AUTOCONFIRM=false
            - GOTRUE_LOG_LEVEL=info

    # === SUPABASE - Meta (pour Dashboard) ===
    supabase-meta:
        image: supabase/postgres-meta:v0.80.0
        container_name: soniquebay-supabase-meta
        restart: unless-stopped
        depends_on:
            supabase-db:
                condition: service_healthy
        networks:
            default:
                aliases:
                    - supabase-meta
        environment:
            - PG_META_PORT=8080
            - PG_META_DB_HOST=supabase-db
            - PG_META_DB_PORT=5432
            - PG_META_DB_NAME=${SUPABASE_DB_NAME:-postgres}
            - PG_META_DB_USER=${SUPABASE_DB_USER:-supabase}
            - PG_META_DB_PASSWORD=${SUPABASE_DB_PASSWORD:-supabase}

    # === SUPABASE - Dashboard (Studio) ===
    supabase-dashboard:
        image: supabase/studio:latest
        container_name: soniquebay-supabase-dashboard
        restart: unless-stopped
        depends_on:
            supabase-db:
                condition: service_healthy
            supabase-meta:
                condition: service_started
        networks:
            default:
                aliases:
                    - supabase-dashboard
        ports:
            - "54325:3000"
        environment:
            - STUDIO_PG_META_URL=http://supabase-meta:8080
            - POSTGRES_PASSWORD=${SUPABASE_DB_PASSWORD:-supabase}
            - SUPABASE_URL=http://supabase-db:5432
            - SUPABASE_PUBLIC_URL=http://localhost:54321
            - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvbnF1ZWJheSIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNjAwMDAwMDAwLCJleHAiOjE5MDAwMDAwMDB9.test}
            - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvbnF1ZWJheSIsInJvbGUiOiJzZXJ2aWNlX3JvbGUiLCJpYXQiOjE2MDAwMDAwMDAsImV4cCI6MTkwMDAwMDAwMH0.test}

    # === REDIS (broker + backend) ===
    redis:
        image: redis:7
        container_name: soniquebay-redis
        restart: unless-stopped
        command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec", "--save", "300", "100", "--tcp-keepalive", "300", "--timeout", "300", "--maxmemory", "1gb", "--maxmemory-policy", "allkeys-lru"]
        volumes:
            - redis-data:/data
            - /etc/localtime:/etc/localtime:ro
        networks:
            default:
                aliases:
                    - redis
        ports:
            - "6379:6379"
        healthcheck:
            test: ["CMD-SHELL", "redis-cli ping && redis-cli info | grep -q 'loading:0'"]
            interval: 5s
            timeout: 3s
            retries: 20
            start_period: 60s
        depends_on:
            timesync:
                condition: service_started

    # === API - OPTIMISÉ POUR RASPBERRY PI ===
    api-service:
        build:
            context: .
            dockerfile: backend/api/Dockerfile
        container_name: soniquebay-api
        restart: unless-stopped
        command: ["python3", "-m", "uvicorn", "backend.api.api_app:create_api", "--host", "0.0.0.0", "--port", "8001","--factory"]
        volumes:
            - ./backend:/app/backend
            - api-data:/app/backend/data/
            - music-share:/music:ro
            - ./logs:/app/logs
            - /etc/localtime:/etc/localtime:ro
        env_file:
            - .env
        environment:
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}
            - WAIT_HOSTS=${POSTGRES_HOST}:${POSTGRES_PORT}
            - WAIT_TIMEOUT=300
            - WAIT_SLEEP_INTERVAL=30
            - WAIT_HOST_CONNECT_TIMEOUT=30
            - CELERY_BROKER_URL=redis://redis:6379/0
            - CELERY_RESULT_BACKEND=redis://redis:6379/0
            - REDIS_URL=redis://redis:6379/0
            - LLM_PROVIDER=koboldcpp
            - KOBOLDCPP_BASE_URL=http://llm-service:5001
            - AGENT_MODEL=koboldcpp/qwen2.5-3b-instruct-q4_k_m
            - HEALTHCHECK_PORT=8001
            - PLATFORM=${PLATFORM:-windows}
            - MUSIC_PATH=/music
            - NAS_USER=${NAS_USER:-""}
            - NAS_PASS=${NAS_PASS:-""}
            # === SUPABASE CONFIGURATION ===
            - SUPABASE_URL=${SUPABASE_URL:-http://supabase-db:5432}
            - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvbnF1ZWJheSIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNjAwMDAwMDAwLCJleHAiOjE5MDAwMDAwMDB9.test}
            - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvbnF1ZWJheSIsInJvbGUiOiJzZXJ2aWNlX3JvbGUiLCJpYXQiOjE2MDAwMDAwMDAsImV4cCI6MTkwMDAwMDAwMH0.test}
            - USE_SUPABASE=${USE_SUPABASE:-false}
        depends_on:
            redis:
                condition: service_healthy
            timesync:
                condition: service_started
            db:
                condition: service_healthy
            supabase-db:
                condition: service_healthy
            llm-service:
                condition: service_started
        networks:
            default:
                aliases:
                    - api
                    - library
        ports:
            - "8001:8001"
        healthcheck:
            test: ["CMD-SHELL", "/healthcheck.sh"]
            interval: 30s
            timeout: 5s
            retries: 5
            start_period: 10s
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 768M
                reservations:
                    cpus: '0.25'
                    memory: 256M

    # === FRONTEND ===
    frontend:
        build:
            context: .
            dockerfile: frontend/Dockerfile
        container_name: soniquebay-frontend
        restart: unless-stopped
        command: ["sh", "-c", "python start_ui.py"]
        volumes:
            - ./frontend:/app/frontend
            - ./logs:/app/logs
        env_file:
            - .env
        environment:
            - API_URL=http://api:8001
            - PUBLIC_API_URL=http://localhost:8001
            - ENCRYPTION_KEY=${ENCRYPTION_KEY}
            - TZ=${TZ}
            - PYTHONUNBUFFERED=1
            - PYTHONDONTWRITEBYTECODE=1
            # === SUPABASE CONFIGURATION ===
            - SUPABASE_URL=${SUPABASE_URL:-http://localhost:54321}
            - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvbnF1ZWJheSIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNjAwMDAwMDAwLCJleHAiOjE5MDAwMDAwMDB9.test}
            - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvbnF1ZWJheSIsInJvbGUiOiJzZXJ2aWNlX3JvbGUiLCJpYXQiOjE2MDAwMDAwMDAsImV4cCI6MTkwMDAwMDAwMH0.test}
            - USE_SUPABASE=${USE_SUPABASE:-false}
        depends_on:
            api-service:
                condition: service_healthy
            supabase-db:
                condition: service_healthy
        networks:
            default:
                aliases:
                    - frontend
        ports:
            - "8080:8080"
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080"]
            interval: 15s
            timeout: 5s
            retries: 3
            start_period: 10s
        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 512M
                reservations:
                    cpus: '0.25'
                    memory: 128M

    # === CELERY WORKER UNIFIÉ AVEC AUTOSCALE - OPTIMISÉ POUR RASPBERRY PI ===
    celery-worker:
        build:
            context: .
            dockerfile: backend_worker/Dockerfile
        container_name: soniquebay-celery-worker
        restart: unless-stopped
        command: >
            celery -A backend_worker.celery_app worker
            -E 
            -Q scan,extract,batch,insert,covers,deferred_vectors,deferred_covers,deferred_enrichment,vectorization_monitoring,deferred,celery,maintenance
            --concurrency=1
            --loglevel=INFO
            --hostname=celery-worker@%h
        volumes:
            - ./backend_worker:/app/backend_worker
            - music-share:/music:ro
            - ./logs:/app/logs
            - /etc/localtime:/etc/localtime:ro
        environment:
            - CELERY_BROKER_URL=redis://redis:6379/0
            - CELERY_RESULT_BACKEND=redis://redis:6379/0
            - API_URL=http://api:8001
            - MUSIC_PATH=/music
            - PLATFORM=docker
            - NAS_USER=${NAS_USER:-""}
            - NAS_PASS=${NAS_PASS:-""}
        depends_on:
            redis:
                condition: service_healthy
            timesync:
                condition: service_started
            api-service:
                condition: service_healthy
        networks:
            default:
                aliases:
                    - celery-worker
        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 2G
                reservations:
                    cpus: '0.25'
                    memory: 512M

    # === CELERY BEAT ===
    celery_beat:
        build:
            context: .
            dockerfile: backend_worker/Dockerfile
        container_name: soniquebay-celery-beat
        restart: unless-stopped
        depends_on:
            - redis
        environment:
            - CELERY_BROKER_URL=redis://redis:6379/0
            - CELERY_RESULT_BACKEND=redis://redis:6379/0
            - CELERY_BEAT_DB=/app/backend_worker/data/celery_beat_data/celerybeat-schedule.db
        volumes:
            - .:/app
            - celery-beat-data:/app/backend_worker/data/celery_beat_data
            - ./logs:/app/logs
        command: ["celery", "-A", "backend_worker.celery_beat_config", "beat", "--loglevel=info"]
        networks:
            default:
        healthcheck:
            test: ["CMD", "pgrep", "-f", "celery.*beat"]
            interval: 30s
            timeout: 5s
            retries: 5
            start_period: 10s
        deploy:
            resources:
                limits:
                    cpus: '0.25'
                    memory: 256M
                reservations:
                    cpus: '0.1'
                    memory: 128M

    # === LLM SERVICE (KoboldCpp) ===
    llm-service:
        image: koboldai/koboldcpp:latest
        container_name: llm-service
        restart: unless-stopped
        pull_policy: missing
        environment:
            - TZ=${TZ}
            - HF_TOKEN=${HF_TOKEN}
            - MODEL=qwen2.5-3b-instruct-q4_k_m.gguf
            - KCPP_DONT_UPDATE=false
            - KCPP_DONT_TUNNEL=true
            - KCPP_E
            - KCPP_ARGS=
                --model qwen2.5-3b-instruct-q4_k_m.gguf
                --embeddingsmodel=https://huggingface.co/nomic-ai/nomic-embed-text-v1.5-GGUF/blob/main/nomic-embed-text-v1.5.Q4_K_M.gguf?download=true
                --usecpu
                --threads 4
                --port 5001
                --blasbatchsize 512
                --usemlock
        tty: true
        volumes:
            - ./llm-service/models:/workspace
        ports:
            - "11434:5001"
        networks:
            default:
                aliases:
                    - llm-service
        healthcheck:
            test: ["CMD-SHELL", "curl -sf http://localhost:5001/v1/models || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 120s

    # === CELERY INSIGHTS ===
    celery-insights:
        image: ghcr.io/danyi1212/celery-insights:latest
        container_name: soniquebay-celery-insights
        env_file:
            - .env
        restart: unless-stopped
        environment:
            - BROKER_URL=redis://redis:6379/0
            - RESULT_BACKEND=redis://redis:6379/0
        ports:
            - "8555:8555"
        depends_on:
            redis:
                condition: service_healthy
            celery-worker:
                condition: service_started

volumes:
    redis-data:
        driver: local
        driver_opts:
            type: none
            device: ${PWD}/data/redis_data
            o: bind
    supabase-data:
        driver: local
        driver_opts:
            type: none
            device: ${PWD}/data/supabase_data
            o: bind
    api-data:
        driver: local
        driver_opts:
            type: none
            device: ./backend/data
            o: bind
    music-share:
        driver: local
        driver_opts:
            type: cifs
            device: //SRV_NAS/music
            o: username=${NAS_USER},password=${NAS_PASS},uid=1000,gid=1000,vers=2.0,iocharset=utf8,dir_mode=0755,file_mode=0644
    celery-beat-data:
        driver: local
        driver_opts:
            type: none
            device: ${PWD}/data/celery_beat_data
            o: bind
    flower-data:
        driver: local
        driver_opts:
            type: none
            device: ${PWD}/data/flower_data
            o: bind
    logs:
        driver: local

networks:
    default:
        name: soniquebay-network
